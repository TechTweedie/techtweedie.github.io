# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  # Runs on pushes targeting the v2 branch
  push:
    branches: ["v2"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Schedule to run every hour
  #schedule:
  # - cron: '0 * * * *'

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.152.2
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Install Dart Sass
        run: |
          wget -O ${{ runner.temp }}/dart-sass.tar.gz https://github.com/sass/dart-sass/releases/download/1.63.6/dart-sass-1.63.6-linux-x64.tar.gz \
          && tar -xzf ${{ runner.temp }}/dart-sass.tar.gz -C ${{ runner.temp }}/ \
          && sudo mv ${{ runner.temp }}/dart-sass /usr/local/bin/dart-sass \
          && sudo ln -s /usr/local/bin/dart-sass/sass /usr/local/bin/sass
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Update Hugo Modules
        run: hugo mod tidy
      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
      - name: Refresh mightora footer data
        run: |
          python3 - <<'EOF'
          import json, urllib.request, re

          url = "https://cdn.jsdelivr.net/gh/mightora/shared-ui@main/footer.yaml"
          try:
              with urllib.request.urlopen(url, timeout=10) as r:
                  raw = r.read().decode()

              # Parse brands
              brands = []
              for m in re.finditer(
                  r'brands:.*?(?=\nsections:)', raw, re.DOTALL):
                  for bm in re.finditer(
                      r'- name:\s*"([^"]+)".*?url:\s*"([^"]+)".*?logo:\s*"([^"]+)".*?description:\s*"([^"]+)"',
                      m.group(), re.DOTALL):
                      brands.append({"name": bm.group(1), "url": bm.group(2),
                                     "logo": bm.group(3), "description": bm.group(4)})

              # Parse sections â€” tolerant of indentation bugs in the source YAML
              sections_text = re.search(r'^sections:(.*)', raw, re.DOTALL | re.MULTILINE)
              cols = {1: [], 2: [], 3: []}
              if sections_text:
                  block = sections_text.group(1)
                  entries = re.split(r'\n\s{0,4}-\s+title:', block)
                  for entry in entries[1:]:
                      title = entry.split('\n')[0].strip().strip('"')
                      c = re.search(r'column:\s*(\d)', entry)
                      p = re.search(r'position:\s*(\d)', entry)
                      links_block = re.search(r'links:(.*?)(?=\n\s{0,4}-\s+title:|\Z)', entry, re.DOTALL)
                      if not (title and c and links_block):
                          continue
                      links = []
                      for lm in re.finditer(r'-\s+name:\s*"([^"]+)"[^\n]*\n\s+url:\s*"([^"]+)"', links_block.group(1)):
                          links.append({"name": lm.group(1), "url": lm.group(2)})
                      col = int(c.group(1))
                      pos = int(p.group(1)) if p else 99
                      if col in cols:
                          cols[col].append({"title": title, "position": pos, "links": links})

              columns = [
                  sorted(cols[1], key=lambda x: x["position"]),
                  sorted(cols[2], key=lambda x: x["position"]),
                  sorted(cols[3], key=lambda x: x["position"]),
              ]
              for col in columns:
                  for s in col:
                      s.pop("position", None)

              footer = {"brands": brands, "columns": columns}

              with open("data/mightoraFooter.json", "w") as f:
                  json.dump(footer, f, indent=2, ensure_ascii=False)
              print("mightoraFooter.json updated successfully")

          except Exception as e:
              print(f"Warning: could not refresh footer data ({e}), using committed version")
          EOF
      - name: Build with Hugo
        env:
          # For maximum backward compatibility with Hugo modules
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
      - name: Commit built site to builtSite branch
        run: |
          # Configure Git
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Check if the public directory exists
          if [ ! -d "public" ]; then
            echo "Error: public directory does not exist. Hugo build might have failed."
            exit 1
          fi

          # Copy public directory to a temporary location
          cp -r public /tmp/hugo-public

          # Switch to the builtSite branch (create it if it doesn't exist)
          git fetch origin builtSite || true
          git checkout -B builtSite

          # Clean out the branch
          git rm -rf . || true

          # Add the built site from temp location
          cp -r /tmp/hugo-public/* .
          git add .

          # Commit and push changes
          git commit -m "Update built site"
          git push origin builtSite --force

  # Deployment job
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
